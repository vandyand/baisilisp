name: Release to PyPI

on:
  # A stable release is deliberately explicit: publish a GitHub release for a
  # ``vX.Y.Z`` tag whose version matches pyproject.toml.
  release:
    types: [published]
  # Development builds are published only after the repository's test workflow
  # has succeeded for a push to main, never for a pull request or a fork.
  workflow_run:
    workflows: ["Run tests"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.event.workflow_run.head_sha }}
  cancel-in-progress: ${{ github.event_name == 'workflow_run' }}

# The platform specific build jobs below were adapted from maturin. An updated
# skeleton can be generated using the following command, but will require manual
# adaptation to this file's format:
#
#    maturin generate-ci github
#
jobs:
  prepare:
    if: >-
      github.event_name == 'release' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      source-ref: ${{ steps.release.outputs.source-ref }}
      version: ${{ steps.release.outputs.version }}
      is-stable: ${{ steps.release.outputs.is-stable }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_sha }}
      - id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          declared_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as project:
              print(tomllib.load(project)["project"]["version"])
          PY
          )"
          if [[ "$EVENT_NAME" == "release" ]]; then
            release_version="${RELEASE_TAG#v}"
            if [[ "$RELEASE_TAG" != "v$release_version" || "$release_version" != "$declared_version" ]]; then
              echo "GitHub release tag $RELEASE_TAG must equal v$declared_version" >&2
              exit 1
            fi
            version="$release_version"
            source_ref="$RELEASE_TAG"
            stable=true
          else
            version="${declared_version}.dev${GITHUB_RUN_NUMBER}"
            source_ref="$SOURCE_SHA"
            stable=false
          fi
          echo "source-ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is-stable=$stable" >> "$GITHUB_OUTPUT"

  ###################
  # Platform Builds #
  ###################
  linux:
    needs: [prepare]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source-ref }}
      - name: Set distribution version
        run: python scripts/set_distribution_version.py "${{ needs.prepare.outputs.version }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    needs: [prepare]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source-ref }}
      - name: Set distribution version
        run: python scripts/set_distribution_version.py "${{ needs.prepare.outputs.version }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: [prepare]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source-ref }}
      - name: Set distribution version
        run: python scripts/set_distribution_version.py "${{ needs.prepare.outputs.version }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: [prepare]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source-ref }}
      - name: Set distribution version
        run: python scripts/set_distribution_version.py "${{ needs.prepare.outputs.version }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source-ref }}
      - name: Set distribution version
        run: python scripts/set_distribution_version.py "${{ needs.prepare.outputs.version }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  ##############################
  # PyPI development snapshots #
  ##############################
  development-pypi-release:
    if: ${{ needs.prepare.outputs.is-stable != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/baisilisp/
    name: Publish development snapshot to PyPI
    needs: [prepare, linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
      - name: Collect distributions
        run: |
          mkdir dist
          find wheels-* -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          find dist -type f -print
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

  ##################
  # Stable releases #
  ##################
  github-release:
    if: ${{ needs.prepare.outputs.is-stable == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: release
    name: >-
      Sign the Python distribution with Sigstore and upload them to GitHub Release
    needs: [prepare, linux, musllinux, windows, macos, sdist]
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v7
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.2.0
      with:
        inputs: >-
          ./wheels-*/*.tar.gz
          ./wheels-*/*.whl
    - name: Print all files recursively
      run: find .
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: gh release upload "${{ github.event.release.tag_name }}" wheels-*/* --clobber --repo "$GITHUB_REPOSITORY"

  pypi-release:
    if: ${{ needs.prepare.outputs.is-stable == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/baisilisp/
    name: Release to PyPI
    needs: [prepare, linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
      - name: Collect distributions
        run: |
          mkdir dist
          find wheels-* -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          find dist -type f -print
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
